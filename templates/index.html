<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content ="width=device-width, initial-scale=1.0">
        <title>Novel Library</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">   

        <!--making it pretty w css-->
        <style>
            body{
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                text-align: center;

                --border-radius-s: 8px;
                --border-radius-m: 30px;
                --border-radius-circle: 50%;

                background-color: #fffefc;
                color:#5f4d43;
                font-family: 'Neuton', serif;

                .neuton-extralight {
                font-family: "Neuton", serif;
                font-weight: 200;
                font-style: normal;
                }

                .neuton-light {
                font-family: "Neuton", serif;
                font-weight: 300;
                font-style: normal;
                }

                .neuton-regular {
                font-family: "Neuton", serif;
                font-weight: 400;
                font-style: normal;
                }

                .neuton-bold {
                font-family: "Neuton", serif;
                font-weight: 700;
                font-style: normal;
                }

                .neuton-extrabold {
                font-family: "Neuton", serif;
                font-weight: 800;
                font-style: normal;
                }

                .neuton-regular-italic {
                font-family: "Neuton", serif;
                font-weight: 400;
                font-style: italic;
                }

                :root {
                    --green: #96a090;
                    --light-green: #c5d862;
                    --cream: #fffddd;
                    --brown: #9a7c69;
                    --pink: #ecb0a1;
                    --gray: #79796f;
                    --dark-cream: #c0bea8;
                    
                }
            }
        
        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        a {
            text-decoration: none;
        }

        img {
            width: 100%;
        }

        /* login and signup buttons ! ------------------- */
        .login-btn {
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Neuton', serif;
            color:#5f4d43;
        }

        .login-btn:hover {
            color: #96a090;
            transition: 0.3s ease;
        }
        
        .signup-btn {
            cursor: pointer;
            background: none;
            font-family: 'Neuton', serif;
            color:#fff;
            background-color: #96a090;
            box-sizing: border-box;
            border-radius: var(--border-radius-m);
            border: 2px solid #96a090;
            padding: 10px 15px;
        }

        .signup-btn:hover {
            color: #5f4d43;
            transition: 0.3s ease;
            background: transparent;
        }

        /* profile icon ! ------------------- */
        .profile-icon {
            display: inline-block;
            margin-right: 15px;
        }

        .profile-icon i {
            cursor: pointer;
            background: none;
            color:#5f4d43;
        }

        .profile-icon i:hover {
            color: #96a090;
            transition: 0.3s ease;
        }

        /* navigation bar ! ------------------- */
        header {
            background: #fff;
        }

        header .navbar {
            display: flex;
            padding: 0px 30px;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.1);
        }

        .navbar .nav-menu {
            display: flex;
            gap: 10px;
            margin-left: -30px;
            overflow: visible;
        }
    
        .navbar .nav-menu .nav-link {
            padding: 10px 18px;
            color: #5f4d43;
            font-size: 15px;
            border-radius: var(--border-radius-m);
            transition: 0.3s ease;
        }

        .navbar .nav-menu .nav-link:hover {
            color: rgb(255, 255, 255);
            background: #96a090;
        }

        /* search bar ! ------------------- */
        .container {
            display: inline-block;
            width: 600px;
            margin-top: 100px;
        }

        form {
            height: 55px;
            display: flex;
            border: 2px solid #5f4d43;
            box-sizing: border-box;
            background: #fff;
            border-radius: var(--border-radius-m);
            overflow: hidden;
            margin-top: 20px;
        }

        form button {
            background: #96a090;
            padding: 10px 40px;
            border: none;
            outline: none;
            color: #fff;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'Neuton', serif;
            font-size: 15px;
        }

        form button:hover {
            color: white;
        }

        form input {
            flex: 1;
            border: none;
            outline: none;
            font-family: 'Neuton', serif;
            font-size: 15px;
            color: var(--brown);
        }

        form .fa-search {
            align-self: center;
            padding: 10px 20px;
            color: var(--green);
        }

        /* welcome img of container ! */
        .welcome {
            width: 450px;
            height: auto;
            margin-top: -60px;
            display: inline-block;
        }

        /* dropdown menu for browse ! ------------------- */
        ul li {
            display: inline-block;
            position: relative;
        }

        /* note: edits the link */
        ul li a {
            display: block;
            padding: 20px 20px;
            color: white;
            text-decoration: none;
            text-align: center;
            font-size: 15px;
        }

        /* note: makes all link bgs fit in the block */
        ul li ul.dropdown li {
            display: block;
        }

        /* note: puts the hidden dropdown menu below 'browse' in a green box */
        ul li ul.dropdown {
            width: fit-content;
            position: absolute;
            top: 100%;
            place-self: center;
            z-index: 999;
            display: none;
            box-sizing: border-box;
            background: #96a090;
            border-radius: var(--border-radius-m);
            overflow: hidden;
        }

        /* note: this keeps the 'browse' text white with green bg */
        .navbar .nav-menu li:hover > a {
            background: #96a090;
            color: white;
        }

        /* note: makes sure the dropdown bg color changes */
        .navbar .nav-menu li a:hover {
            background: #838b7d;
        }

        /* note: displays the dropdown menu */
         ul li:hover ul.dropdown {
            display: block;
        }

        </style>

    </head>

    <body>
        <header>
            <!--library navigation-->
            <nav class = "navbar">

                <h1>Novel. ☘︎ ݁˖</h1>

                <!--navigation buttons-->
                <ul class = "nav-menu">

                    <li class = "nav-item">
                        <a href = "#" class = "nav-link"> Browse
                            <i class="fa-solid fa-chevron-down"></i></a>
                        <ul class = "dropdown">
                            <li><a href="{{ url_for('books') }}">Books</a></li>
                            <li><a href="{{ url_for('movies') }}">Movies</a></li>
                            <li><a href="{{ url_for('computers') }}">Computers</a></li>
                        </ul>
                    </li>

                    <li class = "nav-item">
                        <a href = "#" class = "nav-link">Reservations</a>
                        <ul class = "dropdown">
                            <li><a href = "#">testingggg</a></li>
                        </ul>
                    </li>

                    <li class = "nav-item">
                        <a href = "#" class = "nav-link">My Loans</a>
                    </li>

                    <li class = "nav-item">
                        <a href = "#" class = "nav-link">About Us</a>
                    </li>
                </ul>

                <div>
                    <div class = "profile-icon">
                        <a href = "{{url_for('view_cart')}}">
                            <i class="fa-solid fa-cart-shopping"></i>
                        </a>
                    </div>
                    {% if current_user.is_authenticated %}
                        <div class = "profile-icon">
                            <a href = "{{url_for('profile')}}">
                                <i class="fa-solid fa-user"></i>
                            </a>
                        </div>
                        <a href = "{{url_for('logout')}}">
                            <button class ="login-btn">Log Out</button>
                        </a>
                    {% else %}
                        <a href = "{{url_for('login')}}">
                            <button class ="login-btn">Log In</button>
                        </a>
                        <a href = "{{url_for('signup')}}">
                            <button class ="signup-btn">Sign Up</button>
                        </a>
                    {% endif %}
                </div>

            </nav>
        </header>
        
        <!-- welcome pic with search bar -->
        <div class = "container">
            <div class = "welcome">
                <img src= "https://pbs.twimg.com/media/HEIhL-DaIAAz4Ax?format=jpg&name=large">
            </div>
                    <form method="GET" action="{{ url_for('search') }}">
                        <i class = "fas fa-search"></i>
                        <input 
                            type = "text"
                            name="q"
                            placeholder = "What are you looking for?">
                        <button type = "submit">Search</button>
                    </form>
                </div>
        
    </body>

    </html>

    </html>
