<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Confirmation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    body {
        color: var(--brown-2);
        font-family: 'Neuton', serif;
        background-color: var(--white);
    }

    :root {
        --green: #96a090;
        --light-green: #c5d862;
        --cream: #fffddd;
        --brown: #9a7c69;
        --pink: #ecb0a1;
        --gray: #79796f;
        --dark-cream: #c0bea8;
        --white: #fffefc;
        --light-pink: #fbe9e9;
        --brown-2: #5f4d43;
        --border-radius-m: 30px;
        --border-radius-circle: 50%;
        --border-radius-s: 8px;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 900px;
        margin: 80px auto;
        background: var(--white);
        box-shadow: 0.5rem 0 1rem rgba(0,0,0,.1);
        border-radius: var(--border-radius-m);
        padding: 40px;
        text-align: center;
    }

    .icon {
        font-size: 6rem;
        color: var(--green);
        margin-bottom: 20px;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 10px;
        color: var(--brown-2);
    }

    p {
        font-size: 1.1rem;
        color: var(--gray);
        margin-bottom: 30px;
    }

    .summary-box {
        background: var(--light-pink);
        padding: 20px;
        border-radius: var(--border-radius-m);
        margin-bottom: 30px;
        text-align: left;
    }

    .summary-box h3 {
        margin-bottom: 10px;
        color: var(--brown-2);
    }

    .summary-box p {
        margin: 5px 0;
    }

    .btn {
        padding: 10px 25px;
        background: var(--brown);
        color: white;
        border-radius: var(--border-radius-m);
        text-decoration: none;
        display: inline-block;
        margin: 5px;
    }

    .btn:hover {
        background: var(--pink);
        transition: 0.3s ease;
    }

    .btn-outline {
        background: transparent;
        border: 2px solid var(--brown);
        color: var(--brown);
    }

    .btn-outline:hover {
        background: var(--brown);
        color: white;
    }
</style>
</head>

<body>

<div class="container">

    <div class="icon">
        <i class="fa-solid fa-circle-check"></i>
    </div>

    <h1>Checkout Successful!</h1>
    <p></p>

    <a href="{{ url_for('index') }}" class="btn">Back to Home</a>
    <a href="{{ url_for('view_cart') }}" class="btn btn-outline">View Cart</a>

</div>

</body>
</html>
