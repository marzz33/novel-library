<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Profile{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: var(--white);
            color: #5f4d43;
            font-family: 'Neuton', serif;
        }

        :root {
            --green: #96a090;
            --light-green: #c5d862;
            --cream: #fffddd;
            --brown: #9a7c69;
            --pink: #ecb0a1;
            --gray: #79796f;
            --dark-cream: #c0bea8;
            --white: #fffefc;
            --brown-2: #5f4d43;
            --border-radius-s: 8px;
            --border-radius-m: 30px;
            --border-radius-circle: 50%;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ------------------- layout grid ! ------------------- */

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        /* ------------------- makes the box centered  ------------------- */
        .content {
            display: grid;
            place-items: center;
            padding: 40px;
        }

        /* ------------------- side nav bar ! ------------------- */
        nav ul {
            margin: 0;
            padding: 20px 0;
            height: 100%;
            width: 20%;
            position: fixed;
            top: 0;
            left: 0%;
            background-color: #fffefc;
            box-shadow: 0.5rem 0 1rem rgba(0,0,0,.1);
        }

        nav ul li {
            list-style: none;
        }
        
        nav ul li a {
            display: flex;
            align-items: center;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 20px;
            color: #5f4d43;
            position: relative;
            padding: 10px 0 10px 25px;
            /*left: 10%;*/
        }

        nav ul li a:before {
            content: '';
            position: absolute;
            top: 0;
            right: 0%;
            width: 0%;
            height: 100%;
            background: #96a090;
            border-radius: 40px 0px 0px 40px;
            z-index: -1;
            transition: all 300ms ease-in-out;
        }

        nav ul li a:hover {
            color: var(--white);
            transition: 0.3s ease;
        }

        nav ul li a:hover:before {
            width: 150%;
        }

        .logo {
            width: 180px;
            height: auto;
            display: block;
            margin: 25px auto;
        }

        .logo img {
            width: 100%;
        }

        /* ------------------- form section ! ------------------- */
        .title {
            font-size: 50px;
            margin-top: 50px;
            letter-spacing: 1px;
            color: var(--green);
            text-align: center;
            text-transform: uppercase;
        }

        .container {
            padding: 40px;
            width: 75%;
            background: var(--white);
            border-radius: var(--border-radius-m);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            right: 5%;
            /* transform: translate(80%, 5%); */
        }

        .profile {
            margin-top: 30px;
            margin-bottom: 30px;
            font-size: 20px;
        }

        .profile label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #838b7e;
            letter-spacing: 1px;
        }

        .profile input {
            font-family: 'Neuton', serif;
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 15px;
            color: var(--brown-2);
            letter-spacing: 1px;
        }

        /* ------------------- button ! ------------------- */
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: var(--green);
            color: var(--white);
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
            border-radius: var(--border-radius-m);
            box-sizing: border-box;
            border: 2px solid #838b7e;
            overflow: hidden;
            font-family: 'Neuton', serif;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background-color: #838b7e;
            transition: 0.3s ease;
        }

        /* ------------------- scroll bar ! ------------------- */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent; /* the color behind the scroll */
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--green); 
            border-radius: 10px; 
            border: 1px solid #838b7e;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #838b7e;
        }

        /* ------------------- transaction table ! ------------------- */
        .t-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 3%;
            margin-bottom: 5%;
            table-layout: fixed;
        }

        .t-table th, .t-table td {
            padding: 8px;
            text-align: center;
            overflow: hidden;
            border-bottom: 1px solid #ddd;
            padding: 15px 10px; 
        }   

        .t-table th {
            background-color: var(--green);
            color: var(--white);
            letter-spacing: 1px;
            font-weight: normal;
        }

        /* ------------------- compact action button ! ------------------- */
        .btn-action {
            display: block;
            width: 70px;
            padding: 5px 12px;
            background-color: var(--green);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius-m);
            font-family: 'Neuton', serif;
            font-size: 13px;
            cursor: pointer;
            margin: 4px auto;
        }

        .btn-action:hover {
            background-color: #838b7e;
            transition: 0.3s ease;
        }

        .btn-action.danger {
            background-color: var(--pink);
        }

        .btn-action.danger:hover {
            background-color: #d49585;
            transition: 0.3s ease;
        }

        /* for the pay button in the fines table */
        .pay-btn {
            display: block;
            width: 60px;
            padding: 5px 12px;
            background-color: var(--green);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius-m);
            font-family: 'Neuton', serif;
            font-size: 13px;
            cursor: pointer;
            margin: 4px auto;
        }

        .pay-btn:hover {
            background-color: #838b7e;
            transition: 0.3s ease;
        }

        /* ------------------- fine alert for unpaid fines ! ------------------- */
        .fine-alert {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            padding: 0 6px;
            margin-left: 8px;
            margin-bottom: 2px;
            background: #e74c3c;
            color: #fff;
            font-size: 12px;
            border-radius: var(--border-radius-m);
        }

    </style>
</head>
<body>
    <div class = "layout">
        <nav>
            <ul>
                <!-- don't mind the temporary joker picture -->
                <li class="logo"><img src="https://pbs.twimg.com/media/HD_EVY7aUAAoFH3.jpg"></li>

                <li><a href="{{ url_for('profile') }}"><i class="fa-solid fa-user"></i> &nbsp; Account</a><br></li>

                <li><a href="{{ url_for('loans') }}"><i class="fa-solid fa-book"></i> &nbsp; Loans</a><br></li>

                <li><a href="{{ url_for('reservations') }}"><i class="fa-solid fa-calendar-check"></i> &nbsp; Reservations</a><br></li>

                {% set unpaid_fines = current_user.fines | selectattr('status.value', 'equalto', 'Unpaid') | list %}
                <li><a href="{{ url_for('fines') }}"><i class="fa-solid fa-money-bill"></i> &nbsp; Fines
                    {% if unpaid_fines | length > 0 %}
                        <span class = "fine-alert"> ! </span>
                    {% endif %}
                </a><br></li>

                <li><a href="{{ url_for('transactions') }}"><i class="fa-solid fa-credit-card"></i> &nbsp; Transactions</a><br></li>

                <li><a href="{{ url_for('logout') }}"><i class="fa-solid fa-right-from-bracket"></i> &nbsp; Logout</a><br></li>
            </ul>
        </nav>

        <main class = "content">
            <div class="container">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
