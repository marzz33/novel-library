<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Profile{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--white);
            color: #5f4d43;
            font-family: 'Neuton', serif;

            --border-radius-s: 8px;
            --border-radius-m: 30px;
            --border-radius-circle: 50%;
        }

        :root {
            --green: #96a090;
            --light-green: #c5d862;
            --cream: #fffddd;
            --brown: #9a7c69;
            --pink: #ecb0a1;
            --gray: #79796f;
            --dark-cream: #c0bea8;
            --white: #fffefc;
            --brown-2: #5f4d43;
        }

        /* side nav bar ! ------------------- */
        nav ul {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 20%;
            position: fixed;
            top: 0;
            left: 0%;
            background-color: #fffefc;
            box-shadow: 0.5rem 0 1rem rgba(0,0,0,.1);
        }

        nav ul li {
            list-style: none;
        }
        

        nav ul li a {
            display: flex;
            align-items: center;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 20px;
            color: #5f4d43;
            position: relative;
            padding: 10px 0 10px 25px;
            /*left: 10%;*/

        }

        nav ul li a:before {
            content: '';
            position: absolute;
            top: 0;
            right: 0%;
            width: 0%;
            height: 100%;
            background: #96a090;
            border-radius: 40px 0px 0px 40px;
            z-index: -1;
            transition: all 300ms ease-in-out;
        }

        nav ul li a:hover {
            color: var(--white);
            transition: 0.3s ease;
        }

        nav ul li a:hover:before {
            width: 150%;
        }

        .logo {
            width: 180px;
            height: auto;
            display: block;
            margin: 25px auto;
        }

        .logo img {
            width: 100%;
        }

        /* Account Section ! ------------------- */
        .title {
            font-size: 40px;
            margin-top: 50px;
        }

        .box-area h2 {
            text-transform: uppercase;
            font-size: 50px;
            text-align: center;
        }

        .container {
            padding: 40px;
            width: 40%;
            background: var(--white);
            border-radius: var(--border-radius-m);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
            right: 5%;
            transform: translate(80%, 5%);
        }

        .profile {
            margin-top: 30px;
            margin-bottom: 30px;
            font-size: 20px;
        }

        .profile label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #838b7e;
        }

        .profile input {
            font-family: 'Neuton', serif;
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 15px;
            color: var(--brown-2);
            letter-spacing: 0.5px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: var(--green);
            color: var(--white);
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
            border-radius: var(--border-radius-m);
            box-sizing: border-box;
            border: 2px solid #838b7e;
            overflow: hidden;
            font-family: 'Neuton', serif;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background-color: #838b7e;
            transition: 0.3s ease;
        }


    </style>
</head>
<body>
    <nav>
        <ul>
            <!-- don't mind the temporary joker picture -->
            <li class="logo"><img src="https://pbs.twimg.com/media/HD_EVY7aUAAoFH3.jpg"></li>

            <li><a href="{{ url_for('profile') }}"><i class="fa-solid fa-user"></i> &nbsp; Account</a><br></li>

            <li><a href="#"><i class="fa-solid fa-book"></i> &nbsp; Loans</a><br></li>

            <li><a href="#"><i class="fa-solid fa-calendar-check"></i> &nbsp; Reservations</a><br></li>

            <li><a href="#"><i class="fa-solid fa-money-bill"></i> &nbsp; Fines</a><br></li>

            <li><a href="{{ url_for('transactions') }}"><i class="fa-solid fa-credit-card"></i> &nbsp; Transactions</a><br></li>

            <li><a href="{{ url_for('logout') }}"><i class="fa-solid fa-right-from-bracket"></i> &nbsp; Logout</a><br></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
