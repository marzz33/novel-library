        @keyframes move {
        100% {
            transform: translate3d(0, 0, 1px) rotate(360deg);
        }
        }

        /* ----- grid ---- */
        .layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            min-height: 100vh;
        }

        /* ------- main content area-------- */
        .content {
            padding: 40px 50px;
            background-color: transparent;
        }

        /* -------- sidebar ---------- */
        nav ul {
            margin: 0;
            padding: 20px 0;
            height: 100%;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0%;
            background-color: var(--white);
            box-shadow: 0.5rem 0 1rem rgba(0,0,0,.1);
        }

        nav ul li {
            list-style: none;
        }

        nav ul li a {
            display: flex;
            align-items: center;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 20px;
            color: var(--brown-2);
            position: relative;
            padding: 10px 0 10px 25px;
        }

        nav ul li a:before {
            content: '';
            position: absolute;
            top: 0;
            right: 0%;
            width: 0%;
            height: 100%;
            background: var(--admin-accent);
            border-radius: 40px 0px 0px 40px;
            z-index: -1;
            transition: all 300ms ease-in-out;
        }

        nav ul li a:hover {
            color: var(--white);
            transition: 0.3s ease;
        }

        nav ul li a:hover:before {
            width: 150%;
        }

        nav ul li a.active {
            color: var(--white);
        }

        nav ul li a.active:before {
            width: 150%;
        }

        .logo {
            width: 180px;
            height: auto;
            display: block;
            margin: 25px auto;
        }

        .logo img {
            width: 100%;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-title {
            font-size: 42px;
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ====== search input ===== */
        .search-bar {
            display: flex;
            height: 48px;
            border: 2px solid var(--brown-2);
            border-radius: var(--border-radius-m);
            overflow: hidden;
            background: var(--white);
            width: 100%;
            max-width: 500px;
        }

        .search-bar .fa-search {
            align-self: center;
            padding: 0 18px;
            color: var(--green);
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-family: 'Neuton', serif;
            font-size: 15px;
            color: var(--brown-2);
            background: transparent;
        }

        .search-bar button {
            background: var(--admin-accent);
            padding: 10px 28px;
            border: none;
            outline: none;
            color: white;
            cursor: pointer;
            font-family: 'Neuton', serif;
            font-size: 15px;
            letter-spacing: 1px;
            transition: background 0.2s ease;
        }

        .search-bar button:hover {
            background: var(--admin-accent-dark);
        }

        /* style the table container */
        .card {
            background: var(--white);
            border-radius: var(--border-radius-s);
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            overflow: hidden;
            margin-top: 20px;
        }

        .card table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }

        .card table thead {
            background: var(--admin-accent);
            color: white;
        }

        .card table thead th {
            padding: 14px 20px;
            text-align: left;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 13px;
        }

        .card table tbody tr {
            border-bottom: 1px solid #f0ede8;
            transition: background 0.15s ease;
        }

        .card table tbody tr:hover {
            background: #f7f3ee;
        }

        .card table tbody td {
            padding: 14px 20px;
            color: var(--brown-2);
            vertical-align: middle;
        }

        .action-btn { /*buttons for the rows */
            display: inline-block;
            padding: 5px 14px;
            border-radius: var(--border-radius-m);
            font-family: 'Neuton', serif;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: 0.2s ease;
            text-decoration: none;
        }

        .action-btn.edit {
            background: var(--green);
            color: white;
        }

        .action-btn.edit:hover {
            background: var(--green-dark);
        }

        .action-btn.delete {
            background: #e8c4bb;
            color: var(--admin-accent-dark);
        }

        .action-btn.delete:hover {
            background: var(--admin-accent);
            color: white;
        }

        /* nothing to desplay */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--dark-cream);
            font-size: 20px;
        }

        .empty-state i {
            font-size: 48px;
            display: block;
            margin-bottom: 14px;
        }

        /* labels to show avaiolable or loaned in green and yellow respectively !!! */
        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: var(--border-radius-m);
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .badge.active   { background: #d4e8d0; color: #3a6b34; }
        .badge.suspended{ background: #f5ddd8; color: var(--admin-accent-dark); }
        .badge.available{ background: #d4e8d0; color: #3a6b34; }
        .badge.loaned   { background: #fdf0cc; color: #7a5f00; }
        .badge.reserved { background: #dde8f5; color: #2a5080; }

       </style>
