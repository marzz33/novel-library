<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content ="width=device-width, initial-scale=1.0">
        <title>Novel Library</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Neuton:ital,wght@0,200;0,300;0,400;0,700;0,800;1,400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">   

        <!--making it pretty w css-->
        <style>
            body{
                margin: 0;
                padding: 0;
                box-sizing: border-box;

                --border-radius-s: 8px;
                --border-radius-m: 30px;
                --border-radius-circle: 50%;

                background-color: rgb(255, 255, 255);
                color:rgb(48, 48, 48);
                font-family: 'Neuton', serif;

                .neuton-extralight {
                font-family: "Neuton", serif;
                font-weight: 200;
                font-style: normal;
                }

                .neuton-light {
                font-family: "Neuton", serif;
                font-weight: 300;
                font-style: normal;
                }

                .neuton-regular {
                font-family: "Neuton", serif;
                font-weight: 400;
                font-style: normal;
                }

                .neuton-bold {
                font-family: "Neuton", serif;
                font-weight: 700;
                font-style: normal;
                }

                .neuton-extrabold {
                font-family: "Neuton", serif;
                font-weight: 800;
                font-style: normal;
                }

                .neuton-regular-italic {
                font-family: "Neuton", serif;
                font-weight: 400;
                font-style: italic;
                }
            }
        
        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        a {
            text-decoration: none;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
        }

        img {
            width: 100%;
        }

        /* navigation bar ! */
        header {
            background: #fff;
        }

        header .navbar {
            display: flex;
            padding: 0px 20px;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.1);
        }

        .navbar .nav-menu {
            display: flex;
            gap: 10px;
        }
    
        .navbar .nav-menu .nav-link {
            padding: 10px 18px;
            color: #393939;
            font-size: 15px;
            border-radius: var(--border-radius-m);
            transition: 0.3s ease;
        }

        .navbar .nav-menu .nav-link:hover {
            color: rgb(255, 255, 255);
            background: #ddb892;
        }

        </style>

    </head>

    <body>
        <header>
            <!--library navigation-->
            <nav class = "navbar">

                <h1>Novel.</h1>

                <!--navigation buttons-->
                <ul class = "nav-menu">
                    <li class = "nav-item">
                        <a href = "#" class = "nav-link">Browse</a>
                    </li>
                    <li class = "nav-item">
                        <a href = "#" class = "nav-link">Reservations</a>
                    </li>
                    <li class = "nav-item">
                        <a href = "#" class = "nav-link">My Loans</a>
                    </li>
                    <li class = "nav-item">
                        <a href = "#" class = "nav-link">About Us</a>
                    </li>
                </ul>

                <div>
                    <button>log in</button>
                    <button>sign up</button>
                </div>

            </nav>
        </header>
        
        Amazing library!
    </body>

    </html>

    </html>
